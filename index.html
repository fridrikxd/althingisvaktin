    function stripAccents(str = "") {
      return String(str)
        .toLowerCase()
        .replace(/á|à|â|ä/g, "a")
        .replace(/é|è|ê|ë/g, "e")
        .replace(/í|ì|î|ï/g, "i")
        .replace(/ó|ò|ô|ö/g, "o")
        .replace(/ú|ù|û|ü/g, "u")
        .replace(/ý/g, "y")
        .replace(/ð/g, "d")
        .replace(/þ/g, "th")
        .replace(/æ/g, "ae")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }
    function escapeHtml(str = "") {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function cleanDisplayText(str = "") {
      const decoded = String(str)
        .replace(/<!\[CDATA\[(.*?)\]\]>/gis, "$1")
        .replace(/&lt;/gi, "<")
        .replace(/&gt;/gi, ">")
        .replace(/&nbsp;/gi, " ")
        .replace(/&amp;/gi, "&")
        .replace(/&quot;/gi, '"')
        .replace(/&#39;/gi, "'")
        .replace(/&#x27;/gi, "'")
        .replace(/&#x2F;/gi, "/");

      return decoded
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }
    function detectByAliases(text, aliasMap, fallback) {
      const normalized = stripAccents(text);
      for (const [label, aliases] of Object.entries(aliasMap)) {
        if (aliases.some((alias) => containsAlias(normalized, alias))) return label;
      }
      return fallback;
    }

      return [

        ...(PARTY_MEMBERS[party] || [])

      };
      return labels[value] || shortSourceLabel(value);
    }
    function containsAlias(normalizedText, alias) {
      const normalizedAlias = stripAccents(alias);
      const escaped = normalizedAlias.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const pattern = new RegExp(`(^|[^a-z0-9])${escaped}([^a-z0-9]|$)`, "i");
      if (pattern.test(normalizedText)) return true;
      return normalizedAlias.length >= 4 && normalizedText.includes(normalizedAlias);
    }
    function inferSentiment(text = "") {
      const normalized = stripAccents(text);
      const pos = ["studning", "traust", "fagnar", "sterkt", "lausn"];
      const neg = ["gagnryni", "vandamal", "deila", "fall", "thrystingur"];
      const hasPos = pos.some((word) => normalized.includes(word));
      const hasNeg = neg.some((word) => normalized.includes(word));
      if (hasPos && hasNeg) return "blandad";
      if (hasPos) return "jakvaed";
      if (hasNeg) return "neikvaed";
      return "hlutlaus";
    }
    function formatNumber(n) {
      return new Intl.NumberFormat("is-IS").format(Number(n || 0));
    }
    function formatRelative(iso) {
      if (!iso) return "nuna";
      const diff = Math.max(1, Math.round((Date.now() - new Date(iso).getTime()) / 60000));
      if (diff < 60) return `${diff} min. sidan`;
      if (diff < 1440) return `${Math.round(diff / 60)} klst. sidan`;
      return `${Math.round(diff / 1440)} dagar sidan`;
    }
    function formatDateTime(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("is-IS", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

      document.getElementById("clearFiltersBtn")?.addEventListener("click", () => {
        state.search = "";
        state.selectedParty = "all";
        state.selectedTopic = "all";
        state.selectedMember = "all";
        state.selectedSource = "all";
        state.selectedSentiment = "all";
        state.sortBy = "impact";
        state.visibleFeedCount = 10;
        render();
      });
      document.getElementById("refreshBtn")?.addEventListener("click", () => init());
      document.getElementById("toggleAutoRefreshBtn")?.addEventListener("click", () => { state.autoRefresh = !state.autoRefresh; render(); });
      document.getElementById("toggleFeedBtn")?.addEventListener("click", () => { state.visibleFeedCount += 10; render(); });
      document.getElementById("comparePartyA")?.addEventListener("change", (event) => {
        state.comparePartyA = event.target.value;
        if (state.comparePartyA === state.comparePartyB) {
          state.comparePartyB = sortPartyOptions([...Object.keys(PARTY_ALIASES)]).find((party) => party !== state.comparePartyA) || state.comparePartyB;
        }
        render();
      });
      document.getElementById("comparePartyB")?.addEventListener("change", (event) => {
        state.comparePartyB = event.target.value;
        if (state.comparePartyB === state.comparePartyA) {
          state.comparePartyA = sortPartyOptions([...Object.keys(PARTY_ALIASES)]).find((party) => party !== state.comparePartyB) || state.comparePartyA;
        }
        render();
      });
      document.getElementById("compareLeaderA")?.addEventListener("change", (event) => {
        state.compareLeaderA = event.target.value;
        if (state.compareLeaderA === state.compareLeaderB) {
          state.compareLeaderB = sortPartyOptions([...Object.keys(PARTY_LEADERS)]).find((party) => party !== state.compareLeaderA) || state.compareLeaderB;
        }
        render();
      });
      document.getElementById("compareLeaderB")?.addEventListener("change", (event) => {
        state.compareLeaderB = event.target.value;
        if (state.compareLeaderB === state.compareLeaderA) {
          state.compareLeaderA = sortPartyOptions([...Object.keys(PARTY_LEADERS)]).find((party) => party !== state.compareLeaderB) || state.compareLeaderA;
        }
        render();
      });
      document.querySelectorAll(".mentionBtn").forEach((button) => button.addEventListener("click", () => { state.selectedMentionId = button.dataset.mentionId; render(); }));
      document.querySelectorAll(".keywordBtn").forEach((button) => button.addEventListener("click", () => { state.search = button.dataset.keyword; state.visibleFeedCount = 10; render(); }));
      document.querySelectorAll(".queryModeBtn").forEach((button) => button.addEventListener("click", () => { state.queryMode = button.dataset.mode; state.visibleFeedCount = 10; render(); }));
    }
    async function init() {
      state.loading = true;
      render();
      try {
        const apiData = await fetchDashboard();
        const data = Array.isArray(apiData.feed) && apiData.feed.length ? apiData : buildDemoDashboard();
        state.dashboard = deriveDashboard(data);
        state.usingDemoData = !Array.isArray(apiData.feed) || !apiData.feed.length;
        state.error = "";
      } catch (error) {
        state.dashboard = deriveDashboard(buildDemoDashboard());
        state.usingDemoData = true;
        state.error = `API villa: ${error?.message || error}`;
      } finally {
        state.loading = false;
        state.lastUpdated = new Date().toISOString();
        state.visibleFeedCount = 10;
        if (!state.selectedMentionId || !state.dashboard.feed.find((item) => item.id === state.selectedMentionId)) {
          state.selectedMentionId = state.dashboard.feed[0]?.id || null;
        }
        render();
      }
    }
    init();
    setInterval(() => { if (state.autoRefresh) init(); }, 300000);
  </script>
</body>
</html>
