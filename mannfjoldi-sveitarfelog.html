<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mannfjöldi sveitarfélaga | Sjálfstæðisvaktin</title>
  <link rel="icon" type="image/png" href="https://xd.is/wp-content/uploads/2025/11/XD-Social_Media-Facebook-Profile_picture.png" />
  <link rel="shortcut icon" href="https://xd.is/wp-content/uploads/2025/11/XD-Social_Media-Facebook-Profile_picture.png" />
  <link rel="apple-touch-icon" href="https://xd.is/wp-content/uploads/2025/11/XD-Social_Media-Facebook-Profile_picture.png" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#ffffff,_#f4f8ff_38%,_#e4eefc_72%,_#d8e6fb)] text-slate-900">
  <header class="sticky top-0 z-40 border-b border-[#d7e3fb] bg-[rgba(255,255,255,0.9)] backdrop-blur">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
      <a href="./index.html" class="text-lg font-semibold tracking-tight text-[#081c40]">Sjálfstæðisvaktin</a>
      <nav class="flex flex-wrap gap-2">
        <a href="./index.html" class="rounded-full border border-[#d7e3fb] bg-white px-4 py-2 text-sm font-semibold text-[#16315f] transition hover:border-[#3a8dde] hover:text-[#1446dc]">Fréttavakt</a>
        <a href="./flokkar.html" class="rounded-full border border-[#d7e3fb] bg-white px-4 py-2 text-sm font-semibold text-[#16315f] transition hover:border-[#3a8dde] hover:text-[#1446dc]">Flokkavakt</a>
        <a href="./leidtogar.html" class="rounded-full border border-[#d7e3fb] bg-white px-4 py-2 text-sm font-semibold text-[#16315f] transition hover:border-[#3a8dde] hover:text-[#1446dc]">Leiðtogavakt</a>
        <a href="./sveitarstjornarkosningar-2026.html" class="rounded-full border border-[#d7e3fb] bg-white px-4 py-2 text-sm font-semibold text-[#16315f] transition hover:border-[#3a8dde] hover:text-[#1446dc]">Sveitarstjórnarkosningar 2026</a>
        <a href="./mannfjoldi-sveitarfelog.html" class="rounded-full border border-[#0f2f78] bg-[#0f2f78] px-4 py-2 text-sm font-semibold text-white">Mannfjöldi sveitarfélaga</a>
      </nav>
    </div>
  </header>

  <main id="app" class="mx-auto max-w-7xl p-4 sm:p-6 lg:p-8"></main>

  <script>
    const API_URL = "https://althingisvaktin-api.fridriksi.workers.dev";
    const SOURCE_URL = "https://hagstofa.is/talnaefni/ibuar/mannfjoldi/sveitarfelog-og-byggdakjarnar/";
    const OPEN_DATA_URL = "https://hagstofa.is/utgafur/leidbeiningar/talnagrunnur/um-api/";

    const state = {
      loadingMeta: true,
      loadingData: false,
      error: "",
      municipalities: [],
      selectedCode: "",
      selectedLabel: "",
      rows: [],
      lastUpdated: ""
    };

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("is-IS").format(Number(value || 0));
    }

    function quarterLabel(value = "") {
      return String(value).replace("Q", "Á");
    }

    function parseCsv(text = "") {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (!lines.length) return [];
      const delimiter = (lines[0].match(/;/g) || []).length >= (lines[0].match(/,/g) || []).length ? ";" : ",";
      const parseLine = (line) => {
        const out = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];
          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === delimiter && !inQuotes) {
            out.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        out.push(current);
        return out.map((item) => item.trim());
      };
      const headers = parseLine(lines[0]);
      return lines.slice(1).map((line) => {
        const values = parseLine(line);
        return headers.reduce((acc, header, index) => {
          acc[header] = values[index] || "";
          return acc;
        }, {});
      });
    }

    function currentRows() {
      return [...state.rows].sort((a, b) => a.code.localeCompare(b.code));
    }

    function latestRow() {
      return currentRows().at(-1) || null;
    }

    function previousRow() {
      const rows = currentRows();
      return rows.length > 1 ? rows.at(-2) : null;
    }

    function latestChange() {
      const current = latestRow();
      const previous = previousRow();
      if (!current || !previous) return null;
      return Number(current.population) - Number(previous.population);
    }

    function renderBars(rows) {
      if (!rows.length) return "";
      const recent = rows.slice(-8);
      const max = Math.max(...recent.map((item) => Number(item.population)));
      return `
        <div class="rounded-[28px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
          <div class="text-xs uppercase tracking-[0.22em] text-[#5b7397]">Þróun síðustu 8 ársfjórðunga</div>
          <div class="mt-6 grid grid-cols-4 gap-4 sm:grid-cols-8">
            ${recent.map((item) => `
              <div class="flex flex-col items-center gap-3">
                <div class="flex h-44 w-full items-end justify-center rounded-[20px] bg-[linear-gradient(180deg,_#f6f9ff,_#eef4ff)] px-2 py-3">
                  <div class="w-full rounded-t-[18px] bg-[linear-gradient(180deg,_#7db6ff,_#1446dc)]" style="height:${Math.max(12, Math.round((Number(item.population) / max) * 150))}px"></div>
                </div>
                <div class="text-center text-[11px] font-semibold text-[#365b93]">${escapeHtml(quarterLabel(item.code))}</div>
                <div class="text-center text-xs text-slate-600">${escapeHtml(formatNumber(item.population))}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderTable(rows) {
      if (!rows.length) return "";
      const recent = [...rows].reverse().slice(0, 12);
      return `
        <div class="rounded-[28px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <div class="text-xs uppercase tracking-[0.22em] text-[#5b7397]">Gögn frá Hagstofu Íslands</div>
              <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Mannfjöldi eftir ársfjórðungum</h2>
            </div>
            <a href="${escapeHtml(SOURCE_URL)}" target="_blank" rel="noopener noreferrer" class="rounded-full border border-[#c6d9ff] bg-[#f4f8ff] px-4 py-2 text-sm font-semibold text-[#1446dc] transition hover:border-[#3a8dde] hover:bg-white">Opna upprunagögn</a>
          </div>
          <div class="mt-5 overflow-x-auto">
            <table class="min-w-full border-separate border-spacing-y-3">
              <thead>
                <tr class="text-left text-xs uppercase tracking-[0.18em] text-slate-400">
                  <th class="px-4">Tímabil</th>
                  <th class="px-4">Mannfjöldi</th>
                </tr>
              </thead>
              <tbody>
                ${recent.map((item) => `
                  <tr class="rounded-2xl border border-slate-200 bg-[#f9fbff]">
                    <td class="rounded-l-2xl px-4 py-3 text-sm font-semibold text-[#081c40]">${escapeHtml(quarterLabel(item.code))}</td>
                    <td class="rounded-r-2xl px-4 py-3 text-sm text-slate-700">${escapeHtml(formatNumber(item.population))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function render() {
      const latest = latestRow();
      const change = latestChange();
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="space-y-10">
          <section class="overflow-hidden rounded-[36px] border border-[#0f2f78] bg-[#00258c] text-white shadow-[0_30px_90px_rgba(8,28,64,0.28)]">
            <div class="grid gap-10 p-7 lg:grid-cols-[1.1fr_0.9fr] lg:p-10">
              <div>
                <div class="inline-flex rounded-full border border-[#6f9cf0] bg-[#081c40] px-3 py-1 text-xs font-semibold uppercase tracking-[0.26em] text-white">Hagstofa Íslands</div>
                <h1 class="mt-5 max-w-3xl text-4xl font-semibold tracking-tight sm:text-5xl">Mannfjöldi sveitarfélaga</h1>
                <p class="mt-4 max-w-2xl text-sm leading-6 text-slate-300">Ný undirsíða sem tengist PX-Web API Hagstofu Íslands og sækir mannfjöldatölur eftir sveitarfélögum beint úr opinberri töflu um mannfjölda eftir sveitarfélögum, kyni, ríkisfangi og ársfjórðungum.</p>
                <div class="mt-6 flex flex-wrap gap-2">
                  <a href="${escapeHtml(OPEN_DATA_URL)}" target="_blank" rel="noopener noreferrer" class="rounded-full border border-white bg-white px-4 py-2 text-sm font-semibold text-[#00258c]">Opið gagnaaðgengi</a>
                  <a href="${escapeHtml(SOURCE_URL)}" target="_blank" rel="noopener noreferrer" class="rounded-full border border-[#6f9cf0] bg-[#081c40] px-4 py-2 text-sm font-semibold text-white">Talnaefni sveitarfélaga</a>
                </div>
              </div>
              <div class="rounded-[32px] border border-[#2047a8] bg-[#081c40] p-6">
                <div class="text-xs uppercase tracking-[0.24em] text-[#9bb6ea]">Val og staða</div>
                <div class="mt-5 space-y-4">
                  <label class="block">
                    <span class="mb-2 block text-xs uppercase tracking-[0.18em] text-[#9bb6ea]">Sveitarfélag</span>
                    <select id="municipalitySelect" class="w-full rounded-2xl border border-[#2b57c6] bg-[#0c2358] px-4 py-3 text-sm text-white">
                      ${(state.municipalities.length ? state.municipalities : [{ code: "", label: state.loadingMeta ? "Sæki sveitarfélagalista..." : "Engin gögn fundust" }]).map((item) => `<option value="${escapeHtml(item.code)}" ${item.code === state.selectedCode ? "selected" : ""}>${escapeHtml(item.label)}</option>`).join("")}
                    </select>
                  </label>
                  <div class="grid gap-3 sm:grid-cols-2">
                    <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                      <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Nýjasta tímabil</div>
                      <div class="mt-2 text-xl font-semibold">${latest ? escapeHtml(quarterLabel(latest.code)) : "—"}</div>
                    </div>
                    <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                      <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Mannfjöldi</div>
                      <div class="mt-2 text-xl font-semibold">${latest ? escapeHtml(formatNumber(latest.population)) : "—"}</div>
                    </div>
                    <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                      <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Breyting frá fyrra tímabili</div>
                      <div class="mt-2 text-xl font-semibold">${change === null ? "—" : `${change > 0 ? "+" : ""}${escapeHtml(formatNumber(change))}`}</div>
                    </div>
                    <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                      <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Gögn uppfærð</div>
                      <div class="mt-2 text-xl font-semibold">${state.lastUpdated ? escapeHtml(state.lastUpdated) : "Hagstofa API"}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          ${state.error ? `
            <section class="rounded-[32px] border border-[#ffd3d3] bg-[#fff5f5] p-6 text-sm leading-7 text-[#8f2d2d] shadow-[0_18px_50px_rgba(143,45,45,0.08)]">
              <div class="text-xs uppercase tracking-[0.22em] text-[#ad4b4b]">Villa við gagnasókn</div>
              <p class="mt-3">${escapeHtml(state.error)}</p>
              <div class="mt-4 flex flex-wrap gap-2">
                <a href="${escapeHtml(SOURCE_URL)}" target="_blank" rel="noopener noreferrer" class="rounded-full border border-[#f2baba] bg-white px-4 py-2 text-sm font-semibold text-[#8f2d2d]">Opna talnaefni</a>
                <a href="${escapeHtml(OPEN_DATA_URL)}" target="_blank" rel="noopener noreferrer" class="rounded-full border border-[#f2baba] bg-white px-4 py-2 text-sm font-semibold text-[#8f2d2d]">Skoða API leiðbeiningar</a>
              </div>
            </section>
          ` : ""}

          <section class="grid gap-6 xl:grid-cols-[0.78fr_1.22fr]">
            <div class="rounded-[32px] border border-[#d7e3fb] bg-[linear-gradient(180deg,_#ffffff,_#f7faff)] p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
              <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Hvernig þetta virkar</div>
              <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Tenging við Hagstofu API</h2>
              <div class="mt-5 space-y-4 text-sm leading-7 text-slate-700">
                <p>Þessi síða sækir fyrst metadata úr PX-Web API Hagstofu Íslands og fyllir sveitarfélagalistann út frá opinberu flokkuninni í töflunni.</p>
                <p>Síðan reynir hún að sækja mannfjöldatölur fyrir valið sveitarfélag yfir ársfjórðunga úr sömu töflu og sýnir nýjustu stöðuna, breytingu og þróun í tíma.</p>
                <p>Ef gagnakallið sjálft bilar færðu samt beina leið í upprunatöfluna og API leiðbeiningarnar frá Hagstofunni.</p>
              </div>
            </div>

            <div class="space-y-6">
              ${state.loadingData || state.loadingMeta ? `
                <div class="rounded-[32px] border border-[#d7e3fb] bg-white p-6 text-sm text-[#60779a] shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
                  Sæki metadata og mannfjöldatölur frá Hagstofu Íslands...
                </div>
              ` : renderBars(currentRows())}
              ${!state.loadingData && !state.loadingMeta ? renderTable(currentRows()) : ""}
            </div>
          </section>
        </div>
      `;

      document.getElementById("municipalitySelect")?.addEventListener("change", async (event) => {
        const selected = state.municipalities.find((item) => item.code === event.target.value);
        state.selectedCode = selected?.code || "";
        state.selectedLabel = selected?.label || "";
        state.rows = [];
        state.error = "";
        render();
        if (state.selectedCode) await fetchPopulationData(state.selectedCode, state.selectedLabel);
      });
    }

    async function fetchMetadata() {
      const response = await fetch(`${API_URL}/hagstofa/metadata`, { method: "GET", cache: "no-store" });
      if (!response.ok) throw new Error(`Metadata svaraði ${response.status}`);
      const metadata = await response.json();
      const municipalityVariable = metadata.variables.find((item) => item.code === "Sveitarfélag");
      if (!municipalityVariable) throw new Error("Fann ekki sveitarfélagavídd í Hagstofu metadata.");

      state.municipalities = municipalityVariable.values
        .map((code, index) => ({
          code,
          label: String(municipalityVariable.valueTexts[index] || "").trim()
        }))
        .filter((item) => item.code !== "IS" && item.code !== "IS001" && item.code !== "IS002" && item.label);

      const initial = state.municipalities.find((item) => item.label === "Reykjavíkurborg") || state.municipalities[0];
      state.selectedCode = initial?.code || "";
      state.selectedLabel = initial?.label || "";
      state.lastUpdated = "MAN10001 · 2011-2025";
    }

    async function fetchPopulationData(code, label) {
      state.loadingData = true;
      state.error = "";
      render();
      try {
        const response = await fetch(`${API_URL}/hagstofa/population?code=${encodeURIComponent(code)}`, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) throw new Error(`Gagnakall svaraði ${response.status}`);
        const payload = await response.json();
        const rows = (payload.rows || []).map((row) => ({
          code: row.code || "",
          municipality: row.municipalityLabel || label,
          population: Number(row.population || 0)
        })).filter((row) => row.code && Number.isFinite(row.population));

        if (!rows.length) throw new Error("Engar mannfjöldatölur fundust fyrir valið sveitarfélag.");
        state.rows = rows;
      } catch (error) {
        state.error = `Ekki tókst að sækja mannfjöldatölur beint úr Hagstofu fyrir ${label}. ${error?.message || error}`;
      } finally {
        state.loadingData = false;
        render();
      }
    }

    async function bootstrap() {
      render();
      try {
        await fetchMetadata();
        state.loadingMeta = false;
        render();
        if (state.selectedCode) {
          await fetchPopulationData(state.selectedCode, state.selectedLabel);
        }
      } catch (error) {
        state.loadingMeta = false;
        state.error = `Ekki tókst að lesa sveitarfélagalistann úr Hagstofu API. ${error?.message || error}`;
        render();
      }
    }

    bootstrap();
  </script>
</body>
</html>
