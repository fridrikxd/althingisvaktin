    function slugify(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function stripAccents(value = "") {
      return String(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function decodeEntities(value = "") {
      const textarea = document.createElement("textarea");
      textarea.innerHTML = String(value);
      return textarea.value;
    }

    function cleanDisplayText(value = "") {
      const decoded = decodeEntities(String(value));
      return decoded
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/\bdata-[a-z0-9-]+="[^"]*"/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function truncateWords(text = "", maxWords = 42) {
      const words = cleanDisplayText(text).trim().split(/\s+/).filter(Boolean);
      if (words.length <= maxWords) return words.join(" ");
      return `${words.slice(0, maxWords).join(" ")}...`;
    }

    function formatStamp(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("is-IS", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function relativeTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const diffMinutes = Math.max(1, Math.round((Date.now() - date.getTime()) / 60000));
      if (diffMinutes < 60) return `${diffMinutes} mín. síðan`;
      const diffHours = Math.round(diffMinutes / 60);
      if (diffHours < 24) return `${diffHours} klst. síðan`;
      const diffDays = Math.round(diffHours / 24);
      return `${diffDays} dagar síðan`;
    }

    function canonicalSourceLabel(label = "") {
      const clean = String(label)
        .replace(/\s+RSS$/i, "")
        .replace(/\s+HTML$/i, "")

      const map = {
        Visir: "Vísir",
        RUV: "RÚV",
        Mannlif: "Mannlíf",
        Heimildin: "Heimildin",
        "mbl.is": "mbl.is",
        Vikurfrettir: "Víkurfréttir",
        Eyjafrettir: "Eyjafréttir",
        Austurfrett: "Austurfrétt"
      };
      return map[clean] || clean;
    }

      group.municipalities.map((name) => ({
        name,
        region: group.region,
        slug: slugify(name)

    function municipalityAliases(name) {
      const aliases = new Set(MUNICIPALITY_ALIAS_OVERRIDES[name] || [name]);
      aliases.add(name.replace(/^Sveitarfélagið\s+/i, "").trim());
      aliases.add(name.replace(/^Sveitarfélagið\s+/i, "").trim());
      return [...aliases].filter(Boolean);
    }

    function regionalMediaForMunicipality(selected) {
      return REGIONAL_MEDIA.filter((item) =>
        item.regions.includes("Allt landið") || item.regions.includes(selected.region)
      );
    }

    function municipalityFeed(selected) {
      const feed = state.dashboard?.feed || [];
      const aliases = municipalityAliases(selected.name).map(stripAccents);
      const terms = MUNICIPAL_TERMS.map(stripAccents);
      const directMatches = feed.filter((item) => {
        const combined = stripAccents(`${item.title || ""} ${item.summary || ""}`);
        return aliases.some((alias) => combined.includes(alias));
      });

      const filtered = directMatches.filter((item) => {
        const combined = stripAccents(`${item.title || ""} ${item.summary || ""} ${item.source || ""}`);
        const electionMatch = terms.some((term) => combined.includes(term));
        const politicalMatch = item.party && stripAccents(item.party) !== "oflokkad";
        return electionMatch || politicalMatch;
      });

      return (filtered.length ? filtered : directMatches)
        .sort((a, b) => new Date(b.publishedAt || 0) - new Date(a.publishedAt || 0))
        .slice(0, 24);
    }

    function electionFeedSummary(items) {
      const sourceCounts = new Map();
      const partyCounts = new Map();

      items.forEach((item) => {
        sourceCounts.set(canonicalSourceLabel(item.source), (sourceCounts.get(canonicalSourceLabel(item.source)) || 0) + 1);
        if (item.party && item.party !== "Oflokkat") {
          partyCounts.set(item.party, (partyCounts.get(item.party) || 0) + 1);
        }
      });

      const topSource = [...sourceCounts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || "Engin heimild enn";
      const topParty = [...partyCounts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || "Enginn flokkur enn";

      return { topSource, topParty };
    }

    function renderFeedCards(items) {
      if (!items.length) {
        return `
          <div class="rounded-[28px] border border-dashed border-[#bfd4fb] bg-[#f9fbff] p-6 text-sm leading-6 text-[#60779a]">
            Engar skýrar sveitarstjórnarkosningafréttir fundust í feedinu akkúrat núna. Ég held samt inni staðbundnum miðlum og opinberum heimildum hér fyrir neðan svo við getum bætt þessa vakt áfram.
          </div>
        `;
      }

      return `
        <div class="space-y-5">
          ${items.map((item) => `
            <article class="rounded-[28px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
              <div class="flex flex-wrap items-center gap-2 text-xs font-semibold">
                <span class="rounded-full bg-[#edf3ff] px-3 py-1 text-[#365b93]">${escapeHtml(canonicalSourceLabel(item.source))}</span>
                <span class="rounded-full bg-[#fff3cd] px-3 py-1 text-[#9a6200]">${escapeHtml(item.topic || "Annað")}</span>
                <span class="rounded-full bg-[#eff4ff] px-3 py-1 text-[#405780]">${escapeHtml(item.sentiment || "Hlutlaust")}</span>
                <span class="text-[#60779a]">${escapeHtml(relativeTime(item.publishedAt))}</span>
                <span class="text-[#60779a]">${escapeHtml(formatStamp(item.publishedAt))}</span>
              </div>
              <h3 class="mt-4 text-2xl font-semibold tracking-tight text-[#081c40]">${escapeHtml(item.title || "Án titils")}</h3>
              <p class="mt-3 text-sm leading-7 text-slate-700">${escapeHtml(truncateWords(item.summary || "", 70))}</p>
              <div class="mt-4 flex flex-wrap gap-4 text-sm text-[#60779a]">
                <span>Flokkur ${escapeHtml(item.party || "Óflokkað")}</span>
                <span>Áhrif ${escapeHtml(item.impact || item.engagements || "0")}</span>
                <span>Reach ${escapeHtml(item.reach || "0")}</span>
              </div>
              <a href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener noreferrer" class="mt-5 inline-flex rounded-full border border-[#c6d9ff] bg-[#f4f8ff] px-4 py-2 text-sm font-semibold text-[#1446dc] transition hover:border-[#3a8dde] hover:bg-white">Sjá frétt</a>
            </article>
          `).join("")}
        </div>
      `;
    }

    function render() {
      const selected = MUNICIPALITY_DATA.find((item) => item.name === state.selectedMunicipality) || MUNICIPALITY_DATA[0];
      const municipalityItems = municipalityFeed(selected);
      const summary = electionFeedSummary(municipalityItems);
      const regionalMedia = regionalMediaForMunicipality(selected);
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="space-y-10">
          <section class="overflow-hidden rounded-[36px] border border-[#0f2f78] bg-[#00258c] text-white shadow-[0_30px_90px_rgba(8,28,64,0.28)]">
            <div class="grid gap-10 p-7 lg:grid-cols-[1.12fr_0.88fr] lg:p-10">
              <div>
                <div class="inline-flex rounded-full border border-[#6f9cf0] bg-[#081c40] px-3 py-1 text-xs font-semibold uppercase tracking-[0.26em] text-white">Sveitarstjórnarkosningar 2026</div>
                <h1 class="mt-5 max-w-3xl text-4xl font-semibold tracking-tight sm:text-5xl">Fréttavakt fyrir sveitarfélög landsins</h1>
                <p class="mt-4 max-w-2xl text-sm leading-6 text-slate-300">Í stað þess að senda þig yfir á Google sýnir þessi síða nú lifandi feed af fréttum um sveitarstjórnarkosningarnar, síað eftir sveitarfélögum, miðlum og kosningatengdu samhengi.</p>
                <div class="mt-6 flex flex-wrap gap-2">
                  <span class="rounded-full border border-white bg-white px-4 py-2 text-sm font-semibold text-[#00258c]">${escapeHtml(ELECTION_DATE)}</span>
                  <span class="rounded-full border border-[#6f9cf0] bg-[#081c40] px-4 py-2 text-sm font-semibold text-white">${MUNICIPALITY_DATA.length} sveitarfélög</span>
                  <span class="rounded-full border border-[#6f9cf0] bg-[#081c40] px-4 py-2 text-sm font-semibold text-white">${REGIONAL_MEDIA.length} vaktaðir miðlar</span>
                </div>
              </div>
              <div class="rounded-[32px] border border-[#2047a8] bg-[#081c40] p-6">
                <div class="text-xs uppercase tracking-[0.24em] text-[#9bb6ea]">Staðan núna</div>
                <div class="mt-5 grid gap-3 sm:grid-cols-2">
                  <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Valið sveitarfélag</div>
                    <div class="mt-2 text-xl font-semibold">${escapeHtml(selected.name)}</div>
                  </div>
                  <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Svæði</div>
                    <div class="mt-2 text-xl font-semibold">${escapeHtml(selected.region)}</div>
                  </div>
                  <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Fréttir í feedi</div>
                    <div class="mt-2 text-xl font-semibold">${municipalityItems.length}</div>
                  </div>
                  <div class="rounded-2xl border border-[#2047a8] bg-[#0c2358] p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#9bb6ea]">Mest í fókus</div>
                    <div class="mt-2 text-xl font-semibold">${escapeHtml(summary.topParty)}</div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="grid gap-6 xl:grid-cols-[0.78fr_1.22fr]">
            <div class="rounded-[32px] border border-[#d7e3fb] bg-[linear-gradient(180deg,_#ffffff,_#f7faff)] p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
              <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Sveitarfélag</div>
              <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Veldu sveitarfélag</h2>
              <p class="mt-2 text-sm leading-6 text-[#60779a]">Feedið að hægri síast strax eftir sveitarfélagi, kosningatengdum hugtökum og staðbundnum miðlum.</p>
              <div class="mt-5">
                <select id="municipalitySelect" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm">
                  ${MUNICIPALITY_DATA.map((item) => `<option value="${escapeHtml(item.name)}" ${item.name === selected.name ? "selected" : ""}>${escapeHtml(item.name)} · ${escapeHtml(item.region)}</option>`).join("")}
                </select>
              </div>
              <div class="mt-5 rounded-[24px] border border-slate-200 bg-white p-5">
                <div class="text-xs uppercase tracking-[0.18em] text-slate-400">Leitarorð sem vaktin notar</div>
                <div class="mt-3 flex flex-wrap gap-2">
                  ${municipalityAliases(selected.name).concat(MUNICIPAL_TERMS.slice(0, 5)).map((term) => `<span class="rounded-full border border-slate-200 bg-[#f7faff] px-3 py-1 text-xs font-semibold text-[#16315f]">${escapeHtml(term)}</span>`).join("")}
                </div>
              </div>
              <div class="mt-5 space-y-3">
                ${OFFICIAL_LINKS.map((item) => `
                  <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="block rounded-[22px] border border-slate-200 bg-white p-4 transition hover:border-[#3a8dde] hover:shadow-[0_12px_36px_rgba(0,37,140,0.12)]">
                    <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(item.label)}</div>
                    <p class="mt-2 text-sm leading-6 text-slate-600">${escapeHtml(item.note)}</p>
                  </a>
                `).join("")}
              </div>
            </div>

            <section class="space-y-6">
              <div class="rounded-[32px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                  <div>
                    <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Lifandi feed</div>
                    <h2 class="mt-1 text-3xl font-semibold text-[#081c40]">Fréttir um ${escapeHtml(selected.name)}</h2>
                    <p class="mt-2 text-sm leading-6 text-[#60779a]">Hér birtast fréttir úr miðlægum og staðbundnum miðlum sem passa við ${escapeHtml(selected.name)} og sveitarstjórnarkosningarnar.</p>
                  </div>
                  <div class="rounded-full bg-[#dceaff] px-3 py-1 text-xs font-semibold text-[#1446dc]">${escapeHtml(summary.topSource)}</div>
                </div>
                <div class="mt-6">
                  ${state.loading ? '<div class="rounded-[28px] border border-[#d7e3fb] bg-[#f7faff] p-6 text-sm text-[#60779a]">Sæki nýjustu sveitarstjórnarkosningafréttir...</div>' : state.error ? `<div class="rounded-[28px] border border-[#ffd3d3] bg-[#fff5f5] p-6 text-sm text-[#8f2d2d]">${escapeHtml(state.error)}</div>` : renderFeedCards(municipalityItems)}
                </div>
              </div>

              <div class="grid gap-6 xl:grid-cols-[1fr_0.94fr]">
                <div class="rounded-[32px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
                  <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Héraðsmiðlar í vakt</div>
                  <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Staðbundnar heimildir fyrir ${escapeHtml(selected.region)}</h2>
                  <div class="mt-5 space-y-4">
                    ${regionalMedia.map((item) => `
                      <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="block rounded-[24px] border border-slate-200 bg-[#f9fbff] p-5 transition hover:border-[#3a8dde] hover:shadow-[0_12px_36px_rgba(0,37,140,0.12)]">
                        <div class="flex flex-wrap items-center justify-between gap-3">
                          <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(item.label)}</div>
                          <div class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-[#365b93]">${escapeHtml(item.regions.join(" · "))}</div>
                        </div>
                        <p class="mt-2 text-sm leading-6 text-slate-600">${escapeHtml(item.note)}</p>
                      </a>
                    `).join("")}
                  </div>
                </div>

                <div class="rounded-[32px] border border-[#d7e3fb] bg-[linear-gradient(180deg,_#ffffff,_#f7faff)] p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
                  <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Flokkaslóðir og bakgrunnur</div>
                  <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Viðbótarheimildir</h2>
                  <div class="mt-5 space-y-4">
                    ${PARTY_SOURCE_LIBRARY.map((item) => `
                      <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="block rounded-[24px] border border-slate-200 bg-white p-5 transition hover:border-[#3a8dde] hover:shadow-[0_12px_36px_rgba(0,37,140,0.12)]">
                        <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(item.label)}</div>
                        <p class="mt-2 text-sm leading-6 text-slate-600">${escapeHtml(item.note)}</p>
                      </a>
                    `).join("")}
                  </div>
                </div>
              </div>
            </section>
          </section>

          <section class="rounded-[32px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
              <div>
                <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Yfirlit sveitarfélaga</div>
                <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Svæðaskipt sveitarfélagaskrá</h2>
              </div>
              <div class="rounded-full bg-[#dceaff] px-3 py-1 text-xs font-semibold text-[#1446dc]">${MUNICIPALITY_DATA.length} sveitarfélög</div>
            </div>
            <div class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              ${REGION_GROUPS.map((group) => `
                <div class="rounded-[24px] border border-slate-200 bg-[#f9fbff] p-5">
                  <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(group.region)}</div>
                  <div class="mt-2 text-xs uppercase tracking-[0.18em] text-slate-400">${group.municipalities.length} sveitarfélög</div>
                  <div class="mt-4 flex flex-wrap gap-2">
                    ${group.municipalities.slice(0, 6).map((name) => `<span class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-semibold text-[#16315f]">${escapeHtml(name)}</span>`).join("")}
                    ${group.municipalities.length > 6 ? `<span class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-semibold text-slate-500">+${group.municipalities.length - 6} í viðbót</span>` : ""}
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        </div>
      `;

      document.getElementById("municipalitySelect")?.addEventListener("change", (event) => {
        const url = new URL(window.location.href);
        url.searchParams.set("sveitarfelag", event.target.value);
        state.selectedMunicipality = event.target.value;
        window.history.replaceState({}, "", url.toString());
        render();
      });
    }

    async function fetchDashboard() {
      state.loading = true;
      state.error = "";
      render();
      try {
        const response = await fetch(API_URL, { method: "GET", mode: "cors", cache: "no-store" });
        if (!response.ok) throw new Error(`API villa ${response.status}`);
        state.dashboard = await response.json();
      } catch (error) {
        state.error = `Ekki tókst að sækja fréttafeed fyrir sveitarstjórnarkosningarnar. ${error?.message || error}`;
      } finally {
        state.loading = false;
        render();
      }
    }

    render();
    fetchDashboard();
  </script>
</body>
</html>
