    function slugify(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

      group.municipalities.map((name) => ({

        slug: slugify(name),
        region: group.region

              <div class="mt-5 space-y-4">
                ${MEDIA_HUBS.map((item) => `
                  <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="block rounded-[24px] border border-slate-200 bg-[#f9fbff] p-5 transition hover:border-[#3a8dde] hover:shadow-[0_12px_36px_rgba(0,37,140,0.12)]">
                    <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(item.label)}</div>
                    <p class="mt-2 text-sm leading-6 text-slate-600">${escapeHtml(item.note)}</p>
                  </a>
                `).join("")}
              </div>
            </div>
            <div class="rounded-[32px] border border-[#d7e3fb] bg-[linear-gradient(180deg,_#ffffff,_#f7faff)] p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
              <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Hvernig nota á síðuna</div>
              <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Vöktun á framboðum og sveitarfélögum</h2>
              <div class="mt-5 grid gap-4">
                <div class="rounded-2xl border border-slate-200 bg-white p-4">
                  <div class="text-xs uppercase tracking-[0.18em] text-slate-400">1. Sveitarfélag</div>
                  <p class="mt-2 text-sm leading-6 text-slate-600">Veldu sveitarfélag í fellilistanum og notaðu síðan slóðirnar fyrir fjölmiðla, flokka og bakgrunnsgögn sem snúa að viðkomandi stað.</p>
                </div>
                <div class="rounded-2xl border border-slate-200 bg-white p-4">
                  <div class="text-xs uppercase tracking-[0.18em] text-slate-400">2. Framboðslistar</div>
                  <p class="mt-2 text-sm leading-6 text-slate-600">Þessi fyrsta útgáfa er byggð sem safnsíða og vöktunarsnið. Hún nýtist strax til að rekja framboðslista eftir því sem flokkar og fjölmiðlar birta upplýsingar.</p>
                </div>
                <div class="rounded-2xl border border-slate-200 bg-white p-4">
                  <div class="text-xs uppercase tracking-[0.18em] text-slate-400">3. Næsta skref</div>
                  <p class="mt-2 text-sm leading-6 text-slate-600">Auðvelt er að bæta við sérupplýsingum fyrir hvert sveitarfélag, til dæmis oddvitum, framboðslistum, viðburðum, könnunum og staðbundnum fréttum.</p>
                </div>
              </div>
            </div>
          </section>

          <section class="rounded-[32px] border border-[#d7e3fb] bg-white p-6 shadow-[0_18px_50px_rgba(0,37,140,0.08)]">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
              <div>
                <div class="text-xs uppercase tracking-[0.24em] text-[#5b7397]">Yfirlit sveitarfélaga</div>
                <h2 class="mt-1 text-2xl font-semibold text-[#081c40]">Svæðaskipt uppsetning</h2>
              </div>
              <div class="rounded-full bg-[#dceaff] px-3 py-1 text-xs font-semibold text-[#1446dc]">${municipalityCount} sveitarfélög</div>
            </div>
            <div class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              ${REGIONS.map((group) => `
                <div class="rounded-[24px] border border-slate-200 bg-[#f9fbff] p-5">
                  <div class="text-sm font-semibold text-[#081c40]">${escapeHtml(group.region)}</div>
                  <div class="mt-2 text-xs uppercase tracking-[0.18em] text-slate-400">${group.municipalities.length} sveitarfélög</div>
                  <div class="mt-4 flex flex-wrap gap-2">
                    ${group.municipalities.slice(0, 6).map((name) => `<span class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-semibold text-[#16315f]">${escapeHtml(name)}</span>`).join("")}
                    ${group.municipalities.length > 6 ? `<span class="rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-semibold text-slate-500">+${group.municipalities.length - 6} í viðbót</span>` : ""}
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        </div>
      `;

      document.getElementById("municipalitySelect")?.addEventListener("change", (event) => {
        const url = new URL(window.location.href);
        url.searchParams.set("sveitarfelag", event.target.value);
        window.location.href = url.toString();
      });
    }

    render();
  </script>
</body>
</html>
